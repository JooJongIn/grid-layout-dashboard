<!DOCTYPE html>
<html lang="en">
<head>

<style>
  .resizable-box {
  position: relative;
  width: 300px;
  height: 200px;
  min-width: 200px;
  min-height: 150px;
  background-color: #f0f0f0;
  border: 2px solid #666;
  border-radius: 4px;
  overflow: hidden;
  resize: both;
}

.svg-text {
  font-family: Arial, sans-serif;
  font-size: 48px;
  font-weight: bold;
  fill: #333;
}



/* 리사이즈 핸들 스타일링 */
.resizable-box::-webkit-resizer {
  background-color: #666;
  border: 2px solid white;
  border-radius: 4px;
} 
</style>

   
</head>
<body>
  <div class="resizable-box">
    <svg width="100%" height="100%" viewBox="0 0 300 200">
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="svg-text">
        DoneDoneDoneDoneDoneDoneDoneDone
      </text>
    
    </svg>
  </div>
</body>

</html>
